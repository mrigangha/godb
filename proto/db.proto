syntax = "proto3";

package db;

option go_package = "./generated";

service NoSQLDB {

  rpc Set(SetRequest) returns (SetResponse);

  rpc Get(GetRequest) returns (GetResponse);

  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message SetRequest {
  string key = 1;
  bytes value = 2;
}

message SetResponse {
  bool ok = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool ok = 1;
}
